name: Build on Push

on:
  push:
    branches: ["*"]

jobs:
  build:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/build-image.yml
    with:
      # lastest for master, otherwise the branch name
      image-version: ${{ github.ref_name == 'master' && 'latest' || github.ref_name }}
    secrets: inherit
